<!DOCTYPE html>

  <meta charset="UTF-8">
  <title>枫叶个人博客</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-image: url("img/背景.jpg");
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
    }
    
    .content {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      color: #fff;
      text-align: center;
    }
	html, body {
		height: 100%;
		width: 100%;
	  }
		@keyframes dropAnimation {
		  0% {
			transform: translateY(-100%);
			opacity: 0;
		  }
		  100% {
			transform: translateY(0);
			opacity: 1;
		  }
		}
	  .content {
		animation: dropAnimation 1s ease-in-out;
	  }
  </style>
</head>
<body>
  <div class="content">
    <h1>欢迎来到枫叶个人博客</h1>
    <p>枫叶科技，改变世界</p>
  </div>
</body>
