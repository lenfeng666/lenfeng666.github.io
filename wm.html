<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      transition: background-color 0.5s; /* 添加背景颜色过渡 */
      background-color: #e5e2e7; /* 添加默认背景颜色 */
    }
    .navbar {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }
    .navbar a {
      margin: 0 10px; /* 改为左右边距，以分隔图像 */
      display: inline-block;
      position: relative;
      text-align: center;
      text-decoration: none; /* 去掉链接下划线 */
    }
    .navbar img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
    }
    .navbar .red-line {
      position: absolute;
      left: 0; /* 红线从左侧开始 */
      right: 0; /* 红线到右侧结束 */
      bottom: 0;
      background-color: red;
      height: 2px;
      transition: all 0.5s;
      transform: scaleX(0); /* 默认缩放红线到0宽度，隐藏它 */
    }
    .navbar .text {
      position: absolute;
      left: 0;
      right: 0;
      top: 110px;
      opacity: 0; /* 默认隐藏文字 */
      transition: all 0.5s;
    }
    .navbar a:hover .red-line {
      transform: scaleX(1); /* 鼠标悬停时显示红线 */
    }
    .navbar a:hover .text {
      opacity: 1; /* 鼠标悬停时显示文字 */
    }
    .card {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 350px;
      height: 200px;
      background-color: white;
      border-radius: 10px; /* 修改卡片的圆角 */
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      opacity: 0;
      transition: opacity 0.5s;
    }
    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 10px; /* 修改图片的圆角 */
    }
    .card .text {
      position: absolute;
      bottom: -50px;
      left: 0;
      width: 100%;
      background-color: white;
      padding: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      transform: translateY(100%);
      transition: transform 0.5s;
    }
.card .text {
  border-radius: 10px; /* 修改卡片的圆角 */
  width: 330px; /* 控制宽度 */
}

@media screen and (min-width: 600px) {
  .navbar {
    padding: 50px; /* 电脑端样式：根据需要调整电脑端样式 */
  }

  .navbar img {
    width: 150px; /* 电脑端样式：根据需要调整电脑端样式 */
    height: 150px; /* 电脑端样式：根据需要调整电脑端样式 */
  }

  .navbar .text {
    top: 150px; /* 电脑端样式：根据需要调整电脑端样式 */
  }

  .card {
    width: 500px; /* 电脑端样式：根据需要调整电脑端样式 */
    height: 300px; /* 电脑端样式：根据需要调整电脑端样式 */
  }

  .card .text {
    border-radius: 15px; /* 电脑端样式：修改卡片的圆角 */
    width: 480px; /* 电脑端样式：控制宽度 */
  }
}
  </style>
</head>
<body>
  <div class="navbar">
    <a href="#news">
      <img src="img/tx.jpg" alt="枫叶:游戏核心开发,剧情,场景搭建,后端服务">
      <div class="red-line"></div>
      <div class="text">枫叶</div>
    </a>
    <a href="#contact">
      <img src="https://link.jscdn.cn/sharepoint/aHR0cHM6Ly9tZW5taWFvY3ktbXkuc2hhcmVwb2ludC5jb20vOmk6L3AveGlhb3F2YW5fMzY1L0VYV0U5TjAzS2tSS3ByRmZkd2JFVzJBQkVnaVN4ZFRyb1pLZ3c0T0RBMHdqZ0E_ZT1WbHBnN00.jpg" alt="xaioqvan:游戏策划,项目核心人员,服务器管理">
      <div class="red-line"></div>
      <div class="text">xaioqvan</div>
    </a>
    <a href="#about">
      <img src="img/3.jpg" alt="绅士王:游戏原画师">
      <div class="red-line"></div>
      <div class="text">绅士王</div>
    </a>
  </div>
  <div class="card">
    <img src="" alt="">
    <div class="text">枫叶</div>
  </div>
  <script>
    $(document).ready(function() {
      var selectedImage = null;
      var typingInterval = 100; // 控制打字速度的间隔时间（以毫秒为单位）
      var typingTimeout;

      function typeText(text, element) {
        var index = 0;
        element.text(''); // 清空文字内容
        typingTimeout = setInterval(function() {
          element.text(element.text() + text.charAt(index));
          index++;
          if (index >= text.length) {
            clearInterval(typingTimeout);
          }
        }, typingInterval);
      }

      // 保留图片控制部分的代码
      $('.navbar img').hover(function() {
        var colorThief = new ColorThief();
        var img = $(this)[0];
        var color = colorThief.getColor(img);
        $('body').css('background-color', 'rgb(' + color[0] + ',' + color[1] + ',' + color[2] + ')');
        $('.card').css('opacity', '1');
        $('.card img').attr('src', $(this).attr('src'));
        $('.card .text').text($('.text', $(this).closest('a')).text());
        $('.card .text').css('transform', 'translateY(100%)'); /* 默认隐藏文字 */
      }, function() {
        if (selectedImage != this) {
          $('body').css('background-color', '#f0f0f0'); /* 鼠标离开时恢复默认背景颜色 */
          $('.card').css('opacity', '0');
        }
      });

      // 点击图片时输出alt标签里的内容
      $('.navbar img').click(function() {
        selectedImage = this;
        $('.card .text').css('transform', 'translateY(0)'); /* 点击图片后显示文字 */
        // 在点击图片后，开始以打字机形式输出alt标签内容
        var altText = $(this).attr('alt');
        typeText(altText, $('.card .text'));
      });
    });
  </script>
</body>
</html>
