<style>
  * {
    margin: 0;
    padding: 0;
  }

  body {
    background-color: #0d3462;
  }

  .container {
    width: 760px;
    height: 220px;
    margin: 100px auto;
  }

  .card {
    width: 170px;
    height: 190px;
    margin: 10px;
    transition: 1.5s;
    transform-style: preserve-3d;
    float: left;
    position: relative;
  }

  .card:hover {
    transform: rotateY(180deg);
  }

  .front {
    border: 2px solid #4b2518;
    backface-visibility: hidden;
  }

  .back {
    border: 2px solid white;
    background-color: #4b2518;
    color: white;
    text-align: center;
    transform: rotateY(180deg);
    backface-visibility: hidden;
  }
</style>

<body>
  <div class="container">
    <div class="card">
      <div class="front">
        <img src="img/download.jpg" alt="">
      </div>
      <div class="back">
        <h3>浓缩咖啡</h3>
      </div>
    </div>
    
    <!-- 添加更多图片和文字卡片 -->
    
  </div>
</body>
