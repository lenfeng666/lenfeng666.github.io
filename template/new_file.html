<!DOCTYPE html>
<html>
<head>
  <title>文章标题</title>
  <style>
    body {
      text-align: center; /* 居中对齐整个页面内容 */
      font-family: Arial, sans-serif; /* 设置字体 */
      padding: 20px; /* 添加内边距，增加内容的可读性 */
    }
    h1 {
      text-align: center; /* 居中对齐标题 */
    }
    img {
      max-width: 100%; /* 图片宽度自适应 */
      height: auto; /* 图片高度自适应 */
    }
  </style>
</head>
<body>
  <h1>文章标题</h1>
  <p>日期：2023-10-14</p>
  
  <p>这是文章的第一部分。您可以在这里添加文字内容和图片：</p>
  <img src="枫叶/img/1.jpg" alt="图片1">
  
  <p>这是文章的第二部分。继续添加文字内容和图片：</p>
  <img src="枫叶/img/bg.jpg" alt="图片2">
  
  <!-- 您可以继续在下面添加更多段落和图片 -->

</body>
</html>
